<body class="min-h-screen">

<!-- 접속 코드 게이트 -->

        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>

<!-- Main Content -->
<main id="app" class="pt-14">
</main>

<!-- Toast -->

<script>
// ==================== 접속 코드 설정 ====================
// ⚠️ 수업 당일 아래 코드와 API 키를 변경하세요
const GATE_CONFIG = {
  // API 키 (Gemini) - 수업 전 세팅, 수업 후 삭제
  apiKey: '',
  // 접속 코드 → PPT에 띄워서 안내 (수업 당일 날짜)
  teams: {
    '0414': { name: '수강생', emoji: '🥬' },
  },
};

// ==================== 게이트 로직 ====================
function verifyGateCode() {
  const input = document.getElementById('gateCodeInput').value.trim().toUpperCase();
  const errEl = document.getElementById('gateError');
  if (!input) { errEl.textContent = '코드를 입력해주세요.'; errEl.classList.remove('hidden'); return; }
  const team = GATE_CONFIG.teams[input];
  if (!team) { errEl.textContent = '잘못된 코드입니다. 다시 확인해주세요.'; errEl.classList.remove('hidden'); return; }
  // 인증 성공
  sessionStorage.setItem('gate-team', JSON.stringify({ code: input, ...team }));
  enterApp(team);
}
function enterApp(team) {
  // API 키 자동 세팅
  if (GATE_CONFIG.apiKey) {
    localStorage.setItem('marketing-ai-tools-gemini-key', GATE_CONFIG.apiKey);
    state.apiKey = GATE_CONFIG.apiKey;
  }
  // 게이트 숨기고 앱 표시
  document.getElementById('gateScreen').classList.add('hidden');
  document.getElementById('topBar').classList.remove('hidden');
  // 조 이름 표시
  const badge = document.getElementById('teamBadge');
  badge.classList.remove('hidden'); badge.classList.add('flex');
  document.getElementById('teamEmoji').textContent = team.emoji;
  document.getElementById('teamName').textContent = team.name;
  updateAiStatus();
  route();
}
// Enter 키로 입력
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('gateCodeInput');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') verifyGateCode(); });
  // 세션 유지 (새로고침 시 재인증 불필요)
  const saved = sessionStorage.getItem('gate-team');
  if (saved) { try { const t = JSON.parse(saved); enterApp(t); } catch {} }
});

// ==================== PLAN DRAFT (기획안 양식) ====================
const PLAN_DRAFT_KEY = 'marketing-plan-draft';

function loadPlanDraft() {
  try { return JSON.parse(sessionStorage.getItem(PLAN_DRAFT_KEY) || '{}'); }
  catch { return {}; }
}
function savePlanDraft(field, value) {
  const draft = loadPlanDraft();
  draft[field] = value;
  sessionStorage.setItem(PLAN_DRAFT_KEY, JSON.stringify(draft));
}
function clearPlanDraft() {
  sessionStorage.removeItem(PLAN_DRAFT_KEY);
}
// onclick 속성(작은따옴표 wrapped) 안에 안전하게 넣을 수 있는 JSON 문자열
function planArg(text) {
  return JSON.stringify(String(text || ''))
    .replace(/&/g, '&amp;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
// 도구 결과 → 양식 칸으로 자동 채움. mode: 'replace'(기본) | 'append'
function sendToPlan(slot, text, mode) {
  if (!text) return;
  const clean = String(text).trim();
  if (!clean) return;
  const draft = loadPlanDraft();
  const key = 'slot' + slot;
  if (mode === 'append' && draft[key]) {
    draft[key] = draft[key] + '\n' + clean;
  } else {
    draft[key] = clean;
  }
  sessionStorage.setItem(PLAN_DRAFT_KEY, JSON.stringify(draft));
  showToast(`기획안 ${slot}번 칸에 저장되었습니다`);
  // 잠시 후 홈으로 이동해서 양식 확인
  setTimeout(() => { location.hash = '#home'; }, 700);
}
async function exportPlanAsPNG() {
  const sheet = document.getElementById('planSheet');
  if (!sheet) { showToast('기획안 양식을 찾을 수 없습니다'); return; }
  if (typeof html2canvas === 'undefined') { showToast('PNG 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요'); return; }
  showToast('PNG 만드는 중...');
  try {
    const canvas = await html2canvas(sheet, { backgroundColor: '#ffffff', scale: 2, useCORS: true });
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    const draft = loadPlanDraft();
    const safeTitle = (draft.title || '기획안').replace(/[^\w가-힣ㄱ-ㅎㅏ-ㅣ_-]/g, '_').slice(0, 40);
    a.download = `${safeTitle}_${new Date().toISOString().slice(0,10)}.png`;
    a.href = url;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast('저장 완료! 사진첩/다운로드 폴더 확인');
  } catch (e) {
    console.error('PNG export error:', e);
    showToast('PNG 저장에 실패했습니다. 화면 캡처로 대체해주세요');
  }
}

// ==================== STATE ====================
const state = {
  currentView: 'home',
  apiKey: localStorage.getItem('marketing-ai-tools-gemini-key') || '',
  // Glossary
  glossaryFavorites: JSON.parse(localStorage.getItem('glossary-favorites') || '[]'),
  glossaryViewed: JSON.parse(localStorage.getItem('glossary-viewed') || '[]'),
  glossaryFilter: 'all',
  glossarySearch: '',
  glossaryOpen: null,
  // ROI
  roiResult: null,
  roiSimMultiplier: 1,
  // Color
  selectedEmotion: null,
  // Persona
  persona: { name:'', age:'', gender:'', occupation:'', interests:'', painPoints:'', goals:'', spendLevel:'', sns:[], routine:'' },
  personaGenerated: false,
  // USP
  uspStep: 0,
  uspData: { productName:'', competitors:'', strengths:'', targetNeeds:'' },
  // Hashtag
  hashtagSearch: '',
  hashtagResults: null,
  selectedHashtags: new Set(),
  // SNS Ad
  adData: { subject:'', style:'realistic', textPosition:'center', ctaText:'구매하기', copyText:'' },
  adPreviewPlatform: 'instagram',
  adGenerated: false,
  // Aptitude
  aptPhase: 'intro',
  aptCurrentQ: 0,
  aptScores: { CEO:0, PM:0, CPO:0, CMO:0, CSL:0 },
};

// ==================== DATA ====================
const glossaryTerms = [
  { id: 'g-01', term: 'Marketing', termKo: '마케팅', explanation: '상품이나 서비스를 고객에게 알리고 구매하게 만드는 모든 활동입니다. 단순히 파는 것(판매)과는 다릅니다.', example: '"이 카페는 마케팅을 잘 해서 손님이 많습니다."', category: 'basic' },
  { id: 'g-02', term: 'Target', termKo: '타겟', explanation: '내 상품을 구매할 가능성이 높은 고객층입니다. "누구에게 팔 것인가"를 정하는 과정입니다.', example: '"이 화장품의 타겟은 20대 여성입니다."', category: 'basic' },
  { id: 'g-03', term: 'Persona', termKo: '페르소나', explanation: '타겟 고객을 한 명의 가상 인물로 구체화한 것입니다. 이름, 나이, 취미까지 설정합니다.', example: '"우리 페르소나는 25세 직장인 민수 씨입니다."', category: 'basic' },
  { id: 'g-04', term: 'USP (Unique Selling Proposition)', termKo: 'USP (고유 판매 제안)', explanation: '경쟁 제품과 비교했을 때 "나만 가진 특별한 강점"입니다.', example: '"이 가방의 USP는 가볍지만 튼튼하다는 것입니다."', category: 'basic' },
  { id: 'g-05', term: 'Brand', termKo: '브랜드', explanation: '상품이나 회사의 이름과 이미지입니다. 고객이 "아, 그거!" 하고 떠올리는 것입니다.', example: '"삼성, 네이버 같은 것이 브랜드입니다."', category: 'basic' },
  { id: 'g-06', term: 'Slogan', termKo: '슬로건', explanation: '브랜드를 한 문장으로 소개하는 문구입니다. 짧고 기억하기 쉬워야 합니다.', example: '"Just Do It"은 나이키의 슬로건입니다.', category: 'basic' },
  { id: 'g-07', term: 'SEO (Search Engine Optimization)', termKo: 'SEO (검색엔진 최적화)', explanation: '네이버, 구글 등에서 내 콘텐츠가 상위에 노출되도록 최적화하는 방법입니다.', example: '"SEO를 잘 하면 블로그 방문자가 크게 늘어납니다."', category: 'digital' },
  { id: 'g-08', term: 'Landing Page', termKo: '랜딩 페이지', explanation: '광고를 클릭하면 처음 보이는 웹페이지입니다. 구매나 가입 같은 전환을 유도합니다.', example: '"이벤트 광고를 클릭하면 랜딩 페이지가 나옵니다."', category: 'digital' },
  { id: 'g-09', term: 'CTA (Call To Action)', termKo: 'CTA (행동 유도)', explanation: '"지금 구매하기", "무료 체험" 같은 버튼입니다. 사용자의 다음 행동을 유도합니다.', example: '"CTA 버튼을 빨간색으로 바꿨더니 클릭률이 올랐습니다."', category: 'digital' },
  { id: 'g-10', term: 'Conversion', termKo: '전환', explanation: '방문자가 원하는 행동(구매, 가입 등)을 완료하는 것입니다.', example: '"이 광고는 전환율이 5%입니다." (100명 중 5명이 구매)', category: 'digital' },
  { id: 'g-11', term: 'Hashtag', termKo: '해시태그', explanation: '# 뒤에 키워드를 붙이는 것입니다. 같은 관심사를 가진 사람들이 콘텐츠를 발견할 수 있게 합니다.', example: '"#맛집추천 #서울맛집을 넣으면 노출이 늘어납니다."', category: 'sns' },
  { id: 'g-12', term: 'Engagement', termKo: '참여도 (인게이지먼트)', explanation: '좋아요, 댓글, 공유 등 사용자의 반응을 합산한 지표입니다.', example: '"이 게시물은 인게이지먼트가 높습니다. 댓글이 100개나 달렸습니다."', category: 'sns' },
  { id: 'g-13', term: 'Influencer', termKo: '인플루언서', explanation: 'SNS에서 팔로워가 많은 사람입니다. 추천하면 많은 사람이 관심을 가집니다.', example: '"인플루언서에게 제품을 보내고 리뷰를 요청했습니다."', category: 'sns' },
  { id: 'g-14', term: 'Short-form Content', termKo: '숏폼 콘텐츠', explanation: '1분 이하의 짧은 영상입니다. 틱톡, 릴스, 쇼츠가 대표적입니다.', example: '"요즘은 숏폼 콘텐츠가 대세입니다. 15초 영상이 100만 뷰를 기록했습니다."', category: 'sns' },
  { id: 'g-15', term: 'Algorithm', termKo: '알고리즘', explanation: 'SNS가 어떤 콘텐츠를 사용자에게 보여줄지 결정하는 규칙입니다.', example: '"인스타그램 알고리즘이 바뀌어서 릴스가 더 많이 노출됩니다."', category: 'sns' },
  { id: 'g-16', term: 'Card News', termKo: '카드뉴스', explanation: '여러 장의 이미지에 텍스트를 넣어 만든 콘텐츠입니다. 인스타그램에서 많이 활용합니다.', example: '"카드뉴스로 제품 사용법을 알기 쉽게 설명했습니다."', category: 'sns' },
  { id: 'g-17', term: 'ROAS (Return on Ad Spend)', termKo: 'ROAS (광고 수익률)', explanation: '광고에 투자한 금액 대비 얼마나 벌었는지를 나타내는 지표입니다. 높을수록 좋습니다.', example: '"100만원 써서 300만원 벌었으면 ROAS는 300%입니다."', category: 'performance' },
  { id: 'g-18', term: 'CPC (Cost Per Click)', termKo: 'CPC (클릭당 비용)', explanation: '광고를 한 번 클릭할 때 드는 비용입니다.', example: '"CPC가 500원이면, 한 번 클릭에 500원을 지불하는 것입니다."', category: 'performance' },
  { id: 'g-19', term: 'CTR (Click-Through Rate)', termKo: 'CTR (클릭률)', explanation: '광고를 본 사람 중 실제로 클릭한 사람의 비율입니다.', example: '"100명이 보고 5명이 클릭하면 CTR은 5%입니다."', category: 'performance' },
  { id: 'g-20', term: 'CPA (Cost Per Acquisition)', termKo: 'CPA (고객 획득 비용)', explanation: '고객 한 명을 확보하는 데 드는 비용입니다.', example: '"광고비 10만원으로 고객 10명을 얻었으면 CPA는 1만원입니다."', category: 'performance' },
  { id: 'g-21', term: 'Impression', termKo: '노출 (임프레션)', explanation: '광고가 화면에 표시된 횟수입니다. 같은 사람이 2번 보면 노출 2회입니다.', example: '"이 광고는 하루 노출이 10,000회입니다."', category: 'performance' },
  { id: 'g-22', term: 'KPI (Key Performance Indicator)', termKo: 'KPI (핵심 성과 지표)', explanation: '목표 달성도를 측정하는 핵심 수치입니다.', example: '"이번 달 KPI는 매출 500만원입니다."', category: 'performance' },

function formatNumber(n) {
  if (!n && n !== 0) return '0';
  return Number(n).toLocaleString('ko-KR');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('복사되었습니다')).catch(() => {

  });
}

function getLuminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const [rr,gg,bb] = [r,g,b].map(c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4));
  return 0.2126*rr + 0.7152*gg + 0.0722*bb;
}
function getContrastRatio(hex1, hex2) {
  const l1 = getLuminance(hex1), l2 = getLuminance(hex2);
  const lighter = Math.max(l1,l2), darker = Math.min(l1,l2);
  return (lighter + 0.05)/(darker + 0.05);
}

// 하위 호환: 기존 도구들이 callGeminiAPI 이름으로 호출하고 있어서 alias 유지
async function callGeminiAPI(prompt) { return callGemini(prompt); }
async function callGemini(prompt) {
  try {
    const response = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    if (!response.ok) return null;
    const data = await response.json();
    return data.text || null;
  } catch (e) {
    console.error('Gemini proxy error:', e);
    return null;
  }
}

function extractJSON(text) {
  const match = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (match) return match[1].trim();
  const objMatch = text.match(/\{[\s\S]*\}/);
  return objMatch ? objMatch[0] : text;
}

function safeParseJSON(text) {
  try {
    return JSON.parse(text);
  } catch {
    try {
      const cleaned = extractJSON(text);
      return JSON.parse(cleaned);
    } catch {
      try {
        const fixed = extractJSON(text).replace(/[\n\r\t]/g, ' ').replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
        return JSON.parse(fixed);
      } catch { return null; }
    }
  }
}

      case 'copywriter': app.innerHTML = renderCopywriterTool(); setupCopywriterTool(); break;

      default:

  }

}

function setupGlossary() {
  let showFavOnly = false;
  const renderTerms = () => {
    let terms = glossaryTerms;
    if (showFavOnly) terms = terms.filter(t => state.glossaryFavorites.includes(t.id));
    if (state.glossaryFilter !== 'all') terms = terms.filter(t => t.category === state.glossaryFilter);
    if (state.glossarySearch) {
      const q = state.glossarySearch.toLowerCase();
      terms = terms.filter(t => t.term.toLowerCase().includes(q) || t.termKo.includes(q) || t.explanation.includes(q));
    }
    const list = document.getElementById('glossaryList');
    if (!list) return;
    if (terms.length === 0) { list.innerHTML = '<div class="text-center py-8 text-sm text-gray-400">검색 결과가 없습니다.</div>'; return; }
    list.innerHTML = terms.map(t => {
      const isFav = state.glossaryFavorites.includes(t.id);
      const isViewed = state.glossaryViewed.includes(t.id);
      const isOpen = state.glossaryOpen === t.id;
      return `
        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
          <button class="w-full px-4 py-3 flex items-center justify-between text-left glossary-term-btn" data-id="${t.id}">
            <div class="flex items-center gap-3 flex-1 min-w-0">
              ${isViewed ? '<span class="w-2 h-2 rounded-full bg-blue-400 flex-shrink-0"></span>' : '<span class="w-2 h-2 rounded-full bg-gray-200 flex-shrink-0"></span>'}
              <div class="min-w-0">
                <span class="text-sm font-bold text-gray-900">${t.termKo}</span>
                <span class="text-xs text-gray-400 ml-2">${t.term}</span>
              </div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              <button class="glossary-fav-btn p-1" data-id="${t.id}">${isFav ? '⭐' : '☆'}</button>
              <svg class="w-4 h-4 text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </button>
          <div class="accordion-content ${isOpen ? 'open' : ''}" ${isOpen ? 'style="max-height:500px"' : ''}>
            <div class="px-4 pb-4 border-t border-gray-100 pt-3">
              <p class="text-sm text-gray-700 leading-relaxed mb-2">${t.explanation}</p>
              <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-500 font-medium mb-1">사용 예시</p>
                <p class="text-sm text-gray-600 italic">${t.example}</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // event delegation
    list.querySelectorAll('.glossary-term-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (e.target.closest('.glossary-fav-btn')) return;
        const id = btn.dataset.id;
        state.glossaryOpen = state.glossaryOpen === id ? null : id;
        if (!state.glossaryViewed.includes(id)) { state.glossaryViewed.push(id); localStorage.setItem('glossary-viewed', JSON.stringify(state.glossaryViewed)); }
        renderTerms();
      });
    });
    list.querySelectorAll('.glossary-fav-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        if (state.glossaryFavorites.includes(id)) { state.glossaryFavorites = state.glossaryFavorites.filter(f => f !== id); }
        else { state.glossaryFavorites.push(id); }
        localStorage.setItem('glossary-favorites', JSON.stringify(state.glossaryFavorites));
        document.getElementById('glossaryFavBtn').innerHTML = `⭐ 즐겨찾기 (${state.glossaryFavorites.length})`;
        renderTerms();
      });
    });
  };

  document.getElementById('glossarySearch')?.addEventListener('input', (e) => { state.glossarySearch = e.target.value; renderTerms(); });
  document.querySelectorAll('.glossary-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.glossaryFilter = btn.dataset.cat;
      document.querySelectorAll('.glossary-cat-btn').forEach(b => { b.className = `glossary-cat-btn px-3 py-1.5 rounded-full text-xs font-medium transition ${b.dataset.cat === state.glossaryFilter ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`; });
      renderTerms();
    });
  });
  document.getElementById('glossaryFavBtn')?.addEventListener('click', () => { showFavOnly = !showFavOnly; const btn = document.getElementById('glossaryFavBtn'); btn.className = `px-3 py-1.5 rounded-full text-xs font-medium transition ml-auto ${showFavOnly ? 'bg-amber-200 text-amber-800' : 'bg-amber-50 text-amber-600 hover:bg-amber-100'}`; renderTerms(); });
  renderTerms();
}

function setupROI() {
  document.getElementById('roiCalcBtn')?.addEventListener('click', () => {
    const adSpend = parseFloat(document.getElementById('roiAdSpend').value);
    const revenue = parseFloat(document.getElementById('roiRevenue').value);
    if (!adSpend || adSpend <= 0 || !revenue) { showToast('광고비와 매출을 올바르게 입력해주세요'); return; }
    const roas = (revenue / adSpend) * 100;
    const profit = revenue - adSpend;
    const roi = ((revenue - adSpend) / adSpend) * 100;
    state.roiResult = { adSpend, revenue, roas, profit, roi };
    state.roiSimMultiplier = 1;
    renderROIResults();
  });
}

  const r = state.roiResult;

  const maxBar = Math.max(adSpend, revenue);

    { name: '전자상거래', val: 400 }, { name: '음식/외식', val: 350 }, { name: '패션/뷰티', val: 300 },

      </div>
      <!-- Profit -->
      <div class="bg-white rounded-xl border border-gray-200 p-4">

          <div class="bg-gray-50 rounded-lg p-3">
            <p class="text-xs text-gray-500">예상 매출</p>
            <p class="text-sm font-bold text-blue-600" id="simRevenue">${formatNumber(Math.round(simRevenue))}원</p>

      <div class="bg-amber-50 rounded-xl border border-amber-200 p-4">
        <p class="text-xs font-medium text-amber-800">💡 Tip: ROAS가 300% 이상이면 업계 평균 이상입니다. 광고 최적화를 통해 ROAS를 높이면 같은 예산으로 더 많은 매출을 올릴 수 있습니다.</p>
      </div>
    </div>
  `;

  document.getElementById('roiSimSlider')?.addEventListener('input', (e) => {
    state.roiSimMultiplier = parseFloat(e.target.value);
    const s = state.roiResult.adSpend * state.roiSimMultiplier;
    const rv = state.roiResult.revenue * state.roiSimMultiplier;
    document.getElementById('simSpend').textContent = formatNumber(Math.round(s)) + '원';

  });
}

function setupColorPicker() {
  document.querySelectorAll('.emotion-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.selectedEmotion = btn.dataset.emotion;
      document.querySelectorAll('.emotion-btn').forEach(b => { b.classList.remove('border-blue-500','shadow-md'); b.classList.add('border-gray-200'); });

      renderColorResult();
    });
  });
  if (state.selectedEmotion) renderColorResult();
}

function renderColorResult() {
  const e = colorEmotions.find(c => c.id === state.selectedEmotion);
  if (!e) return;
  const whiteContrast = getContrastRatio(e.mainColor.hex, '#FFFFFF');
  const blackContrast = getContrastRatio(e.mainColor.hex, '#000000');
  const whiteAA = whiteContrast >= 4.5;
  const blackAA = blackContrast >= 4.5;
  const sims = similarEmotions[e.id] || [];
  const allHexes = [e.mainColor.hex, ...e.subColors.map(s => s.hex)];

  const planText = `[브랜드 컬러] ${e.mainColor.nameKo} (${e.mainColor.hex}) — ${e.emotionKo}: ${e.description}`;
  document.getElementById('colorResult').innerHTML = `
    <div class="fade-in space-y-4">
      <button onclick='sendToPlan(4, ${planArg(planText)}, "append")' class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">📄 기획안 [컨셉] 칸에 추가하기</button>

        <p class="text-xs font-medium text-gray-500 mb-1">${e.emotionKo} - ${e.description}</p>
        <div class="flex items-center gap-4 mt-3">
          <div class="w-24 h-24 rounded-2xl color-swatch shadow-lg" style="background:${e.mainColor.hex}" onclick="copyText('${e.mainColor.hex}')"></div>
          <div>
            <p class="text-lg font-bold text-gray-900">${e.mainColor.nameKo}</p>
            <p class="text-sm text-gray-500">${e.mainColor.name}</p>
            <p class="text-sm font-mono text-gray-600 cursor-pointer hover:text-blue-600" onclick="copyText('${e.mainColor.hex}')">${e.mainColor.hex} 📋</p>
          </div>
        </div>
      </div>
      <!-- Sub Colors -->
      <div class="bg-white rounded-xl border border-gray-200 p-4">
        <p class="text-xs font-medium text-gray-600 mb-3">보조 색상</p>
        <div class="grid grid-cols-3 gap-3">
          ${e.subColors.map(s => `
            <div class="text-center cursor-pointer" onclick="copyText('${s.hex}')">
              <div class="w-full h-16 rounded-xl mb-2 color-swatch shadow" style="background:${s.hex}"></div>
              <p class="text-xs font-medium text-gray-700">${s.nameKo}</p>
              <p class="text-[10px] font-mono text-gray-400">${s.hex}</p>
            </div>
          `).join('')}
        </div>
      </div>
      <!-- Accessibility -->
      <div class="bg-white rounded-xl border border-gray-200 p-4">
        <p class="text-xs font-medium text-gray-600 mb-3">접근성 대비 검사 (AA 기준 4.5:1)</p>
        <div class="grid grid-cols-2 gap-3">
          <div class="rounded-xl p-4 text-center" style="background:${e.mainColor.hex}">
            <p class="text-white text-sm font-bold">흰색 텍스트</p>
            <p class="text-xs mt-1 ${whiteAA ? 'text-green-300' : 'text-red-300'}">${whiteAA ? '✅ PASS' : '❌ FAIL'} (${whiteContrast.toFixed(1)}:1)</p>
          </div>
          <div class="rounded-xl p-4 text-center" style="background:${e.mainColor.hex}">
            <p class="text-black text-sm font-bold">검정 텍스트</p>
            <p class="text-xs mt-1 ${blackAA ? 'text-green-300' : 'text-red-300'}">${blackAA ? '✅ PASS' : '❌ FAIL'} (${blackContrast.toFixed(1)}:1)</p>
          </div>
        </div>
      </div>
      <!-- Similar -->
      <div class="bg-white rounded-xl border border-gray-200 p-4">
        <p class="text-xs font-medium text-gray-600 mb-3">비슷한 감정</p>
        <div class="flex gap-2">
          ${sims.map(sid => {
            const se = colorEmotions.find(c => c.id === sid);
            return `<button onclick="state.selectedEmotion='${sid}'; document.querySelectorAll('.emotion-btn').forEach(b=>{b.classList.remove('border-blue-500','shadow-md');b.classList.add('border-gray-200');}); document.querySelector('[data-emotion=${sid}]')?.classList.remove('border-gray-200'); document.querySelector('[data-emotion=${sid}]')?.classList.add('border-blue-500','shadow-md'); renderColorResult();" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-50 hover:bg-gray-100 transition">
              <div class="w-4 h-4 rounded-full" style="background:${se.mainColor.hex}"></div>
              <span class="text-xs font-medium text-gray-700">${se.emotionKo}</span>
            </button>`;
          }).join('')}
        </div>
      </div>
      <!-- Preview -->

        <p class="text-xs font-medium text-gray-600 mb-3">미리보기</p>
        <div class="rounded-xl p-6" style="background:${e.subColors[2]?.hex || e.subColors[1]?.hex || '#f8fafc'}">

          <button class="px-5 py-2.5 rounded-xl text-sm font-bold text-white" style="background:${e.mainColor.hex}">지금 시작하기</button>

      </div>
      <!-- Copy All -->
      <button onclick="copyText('${allHexes.join(', ')}')" class="w-full py-3 bg-gray-900 text-white rounded-xl text-sm font-bold hover:bg-gray-800 transition">전체 팔레트 복사</button>
    </div>
  `;
}

function setupPersonaMaker() {
  document.querySelectorAll('.persona-tmpl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = personaTemplates[btn.dataset.tmpl];
      state.persona = { ...t, sns: [...t.sns] };
      // Re-render form
      const app = document.getElementById('app');
      app.innerHTML = renderPersonaMaker();
      setupPersonaMaker();
    });
  });
  document.querySelectorAll('.persona-gender-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.persona.gender = btn.dataset.g;
      document.querySelectorAll('.persona-gender-btn').forEach(b => { b.className = `persona-gender-btn flex-1 py-2 rounded-xl text-sm font-medium transition ${b.dataset.g === state.persona.gender ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`; });
    });
  });
  document.querySelectorAll('.persona-spend-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.persona.spendLevel = btn.dataset.spend;
      document.querySelectorAll('.persona-spend-btn').forEach(b => { b.className = `persona-spend-btn flex-1 py-2 rounded-xl text-xs font-medium transition ${b.dataset.spend === state.persona.spendLevel ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`; });
    });
  });
  document.querySelectorAll('.persona-sns-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked && !state.persona.sns.includes(cb.value)) state.persona.sns.push(cb.value);
      else state.persona.sns = state.persona.sns.filter(s => s !== cb.value);
    });
  });
  document.getElementById('personaGenBtn')?.addEventListener('click', () => {
    const p = state.persona;
    p.name = document.getElementById('pName').value;
    p.age = document.getElementById('pAge').value;
    p.occupation = document.getElementById('pOcc').value;
    p.interests = document.getElementById('pInt').value;
    p.painPoints = document.getElementById('pPain').value;
    p.goals = document.getElementById('pGoals').value;
    p.routine = document.getElementById('pRoutine').value;
    if (!p.name || !p.age || !p.occupation) { showToast('이름, 나이, 직업은 필수입니다'); return; }
    state.personaGenerated = true;
    renderPersonaResult();
  });
  if (state.personaGenerated) renderPersonaResult();
}

function setupUSPFinder() { renderUSPStep(); }

function renderUSPStep() {
  const d = state.uspData;
  const step = state.uspStep;
  const el = document.getElementById('uspContent');
  if (!el) return;

  // Progress
  const progress = `<div class="flex gap-1 mb-6">${[0,1,2,3].map(i => `<div class="flex-1 h-1.5 rounded-full ${i <= step ? 'bg-blue-600' : 'bg-gray-200'}"></div>`).join('')}</div>`;

  if (step === 0) {
    el.innerHTML = `${progress}
      <div class="bg-white rounded-2xl border border-gray-200 p-6 fade-in">
        <h3 class="text-base font-bold text-gray-900 mb-1">Step 1. 제품/서비스 이름</h3>
        <p class="text-xs text-gray-500 mb-4">USP를 찾을 제품이나 서비스 이름을 입력하세요.</p>
        <input id="uspProduct" type="text" value="${d.productName}" placeholder="예: 우리동네 맛집 앱" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
        <button id="uspNext0" class="w-full py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">다음</button>
      </div>`;
    document.getElementById('uspNext0').addEventListener('click', () => {
      d.productName = document.getElementById('uspProduct').value.trim();
      if (!d.productName) { showToast('제품/서비스 이름을 입력해주세요'); return; }
      state.uspStep = 1; renderUSPStep();
    });
  } else if (step === 1) {
    el.innerHTML = `${progress}
      <div class="bg-white rounded-2xl border border-gray-200 p-6 fade-in">
        <h3 class="text-base font-bold text-gray-900 mb-1">Step 2. 경쟁사</h3>
        <p class="text-xs text-gray-500 mb-4">"${d.productName}"과 경쟁하는 제품/서비스를 적어주세요.</p>
        <textarea id="uspComp" rows="3" placeholder="예: 배달의민족, 요기요, 쿠팡이츠" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-4">${d.competitors}</textarea>
        <div class="flex gap-2">
          <button id="uspPrev1" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200 transition">이전</button>
          <button id="uspNext1" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">다음</button>
        </div>
      </div>`;
    document.getElementById('uspPrev1').addEventListener('click', () => { state.uspStep = 0; renderUSPStep(); });
    document.getElementById('uspNext1').addEventListener('click', () => {
      d.competitors = document.getElementById('uspComp').value.trim();
      if (!d.competitors) { showToast('경쟁사를 입력해주세요'); return; }
      state.uspStep = 2; renderUSPStep();
    });
  } else if (step === 2) {
    el.innerHTML = `${progress}
      <div class="bg-white rounded-2xl border border-gray-200 p-6 fade-in">
        <h3 class="text-base font-bold text-gray-900 mb-1">Step 3. 강점 & 타겟 니즈</h3>
        <p class="text-xs text-gray-500 mb-4">"${d.productName}"만의 강점과 타겟 고객의 니즈를 적어주세요.</p>
        <label class="text-xs font-medium text-gray-600 mb-1 block">우리만의 강점</label>
        <textarea id="uspStr" rows="2" placeholder="예: AI 기반 맞춤 추천, 실시간 리뷰" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-3">${d.strengths}</textarea>
        <label class="text-xs font-medium text-gray-600 mb-1 block">타겟 고객 니즈</label>
        <textarea id="uspNeeds" rows="2" placeholder="예: 빠른 배달, 검증된 맛집만 보고 싶음" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-4">${d.targetNeeds}</textarea>
        <div class="flex gap-2">
          <button id="uspPrev2" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200 transition">이전</button>
          <button id="uspNext2" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">USP 생성하기</button>
        </div>
      </div>`;
    document.getElementById('uspPrev2').addEventListener('click', () => { state.uspStep = 1; renderUSPStep(); });
    document.getElementById('uspNext2').addEventListener('click', () => {
      d.strengths = document.getElementById('uspStr').value.trim();
      d.targetNeeds = document.getElementById('uspNeeds').value.trim();
      if (!d.strengths || !d.targetNeeds) { showToast('강점과 타겟 니즈를 모두 입력해주세요'); return; }
      state.uspStep = 3; renderUSPStep();
    });
  } else if (step === 3) {
    const classic = `"${d.productName}"은(는) ${d.competitors}와 달리, ${d.strengths}합니다. ${d.targetNeeds}을(를) 원하는 고객에게 최고의 선택입니다.`;
    const benefit = `${d.targetNeeds}을(를) 원하신다면, "${d.productName}"을(를) 선택하세요. ${d.competitors}와 달리 ${d.strengths}하니까요.`;
    const emotional = `${d.strengths}. "${d.productName}", 당신의 ${d.targetNeeds}을(를) 위한 유일한 선택.`;

    const planText = `[차별점 / USP] ${classic}`;
    el.innerHTML = `${progress}
      <div class="space-y-4 fade-in">
        <div class="text-center mb-2"><h3 class="text-lg font-bold text-gray-900">USP 도출 결과</h3><p class="text-xs text-gray-500">"${d.productName}"을 위한 3가지 USP 제안</p></div>
        <button onclick='sendToPlan(4, ${planArg(planText)}, "append")' class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">📄 기획안 [컨셉·차별점] 칸에 추가하기</button>
        ${[
          { badge: '🏷️ 클래식', color: 'blue', text: classic },
          { badge: '🎯 베네핏', color: 'green', text: benefit },
          { badge: '💖 감성', color: 'purple', text: emotional },
        ].map(u => `
          <div class="bg-white rounded-xl border border-gray-200 p-5">
            <span class="inline-block px-2 py-0.5 bg-${u.color}-50 text-${u.color}-600 text-xs font-medium rounded-full mb-2">${u.badge}</span>
            <p class="text-sm text-gray-800 leading-relaxed mb-3">${u.text}</p>
            <button onclick="copyText(\`${u.text.replace(/`/g, "'")}\`)" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-xs font-medium hover:bg-gray-200 transition">복사하기</button>
          </div>
        `).join('')}
        <button onclick="state.uspStep=0;state.uspData={productName:'',competitors:'',strengths:'',targetNeeds:''};renderUSPStep();" class="w-full py-3 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200 transition">처음부터 다시하기</button>
      </div>`;
  }
}

function renderHashtagGenerator() {
  const keywords = ['맛집','카페','패션','뷰티','여행','마케팅','창업','인테리어','교육','건강','반려동물','게임'];
  return `
    <div class="gradient-tool-header text-white py-10 px-4">
      <div class="max-w-3xl mx-auto"><h2 class="text-xl font-bold">키워드 전략 생성기</h2><p class="text-sm text-gray-300 mt-1">업종별 해시태그 추천</p></div>
    </div>
    <div class="max-w-3xl mx-auto px-4 py-6">
      <div class="flex gap-2 mb-4">
        <input id="hashtagInput" type="text" placeholder="키워드를 입력하세요 (예: 맛집)" class="flex-1 px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button id="hashtagSearchBtn" class="px-5 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">검색</button>
      </div>
      <div class="flex flex-wrap gap-2 mb-6">
        ${keywords.map(k => `<button class="hashtag-suggest-btn px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium hover:bg-blue-50 hover:text-blue-600 transition" data-kw="${k}">${k}</button>`).join('')}
      </div>
      <div id="hashtagResults"></div>
    </div>
  `;
}

function setupHashtagGenerator() {
  const search = (kw) => {
    state.hashtagSearch = kw;
    state.selectedHashtags.clear();
    const results = hashtagDatabase[kw];
    if (results) { state.hashtagResults = results; }
    else { state.hashtagResults = defaultHashtags; }
    renderHashtagResults();
  };
  document.getElementById('hashtagSearchBtn')?.addEventListener('click', () => {
    const v = document.getElementById('hashtagInput').value.trim();
    if (v) search(v);
  });
  document.getElementById('hashtagInput')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { const v = e.target.value.trim(); if (v) search(v); }
  });
  document.querySelectorAll('.hashtag-suggest-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('hashtagInput').value = btn.dataset.kw;
      search(btn.dataset.kw);
    });
  });
}

function renderHashtagResults() {
  const el = document.getElementById('hashtagResults');
  if (!el || !state.hashtagResults) return;
  const catLabels = { trending: { label: '트렌딩', color: 'red' }, niche: { label: '니치', color: 'purple' }, community: { label: '커뮤니티', color: 'green' } };
  const allTags = state.hashtagResults.flatMap(g => g.hashtags);

  el.innerHTML = `
    <div class="fade-in space-y-4">
      <div class="flex items-center justify-between">
        <p class="text-sm font-bold text-gray-900">"${state.hashtagSearch}" 관련 해시태그</p>
        <span class="text-xs text-blue-600 font-medium" id="selectedCount">선택: ${state.selectedHashtags.size}/30</span>
      </div>
      ${state.hashtagResults.map(group => {
        const cat = catLabels[group.category] || { label: group.category, color: 'gray' };
        return `
          <div class="bg-white rounded-xl border border-gray-200 p-4">
            <span class="inline-block px-2 py-0.5 bg-${cat.color}-50 text-${cat.color}-600 text-xs font-medium rounded-full mb-3">${cat.label}</span>
            <div class="flex flex-wrap gap-2">
              ${group.hashtags.map(tag => `<button class="hashtag-tag-btn px-3 py-1.5 rounded-full text-xs font-medium transition ${state.selectedHashtags.has(tag) ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}" data-tag="${tag}">${tag}</button>`).join('')}
            </div>
          </div>
        `;
      }).join('')}
      <div class="flex gap-2">
        <button id="copySelectedTags" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">선택한 태그 복사</button>
        <button id="copyAllTags" class="flex-1 py-3 bg-gray-900 text-white rounded-xl text-sm font-bold hover:bg-gray-800 transition">전체 복사</button>
      </div>
      ${state.selectedHashtags.size > 0 ? `
      <div class="bg-blue-50 rounded-xl border border-blue-200 p-4">
        <p class="text-xs font-medium text-blue-800 mb-2">전략 분석</p>
        <p class="text-xs text-blue-700 leading-relaxed">총 ${state.selectedHashtags.size}개의 해시태그를 선택했습니다. 인스타그램은 게시물당 최대 30개까지 사용 가능하며, 트렌딩 태그와 니치 태그를 5:5 비율로 혼합하면 노출과 타겟 도달을 동시에 높일 수 있습니다.</p>
      </div>` : ''}
    </div>
  `;

  el.querySelectorAll('.hashtag-tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.tag;
      if (state.selectedHashtags.has(tag)) { state.selectedHashtags.delete(tag); }
      else if (state.selectedHashtags.size < 30) { state.selectedHashtags.add(tag); }
      else { showToast('최대 30개까지 선택할 수 있습니다'); return; }
      renderHashtagResults();
    });
  });
  document.getElementById('copySelectedTags')?.addEventListener('click', () => {
    if (state.selectedHashtags.size === 0) { showToast('선택한 태그가 없습니다'); return; }
    copyText([...state.selectedHashtags].join(' '));
  });
  document.getElementById('copyAllTags')?.addEventListener('click', () => { copyText(allTags.join(' ')); });
}

  const adContent = `

function setupAptitudeTest() { renderAptPhase(); }

function renderAptPhase() {
  const el = document.getElementById('aptContent');
  if (!el) return;

  if (state.aptPhase === 'intro') {
    el.innerHTML = `
      <div class="bg-white rounded-2xl border border-gray-200 p-8 text-center fade-in">
        <div class="text-5xl mb-4">🧠</div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">나는 어떤 유형의 기획자일까?</h3>
        <p class="text-sm text-gray-600 mb-6 leading-relaxed">10개의 상황 질문으로 당신의 기획 성향을 분석합니다.<br>CEO, PM, CPO, CMO, CSL 중 가장 적합한 유형을 찾아보세요.</p>
        <button id="aptStartBtn" class="px-8 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">시작하기</button>
      </div>`;
    document.getElementById('aptStartBtn').addEventListener('click', () => {
      state.aptPhase = 'test'; state.aptCurrentQ = 0; state.aptScores = { CEO:0, PM:0, CPO:0, CMO:0, CSL:0 };
      renderAptPhase();
    });
  } else if (state.aptPhase === 'test') {
    const q = aptitudeQuestions[state.aptCurrentQ];
    const pct = ((state.aptCurrentQ) / aptitudeQuestions.length) * 100;
    el.innerHTML = `
      <div class="fade-in">
        <div class="mb-4">
          <div class="flex justify-between text-xs text-gray-500 mb-1"><span>질문 ${state.aptCurrentQ + 1}/${aptitudeQuestions.length}</span><span>${Math.round(pct)}%</span></div>
          <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full transition-all" style="width:${pct}%"></div></div>
        </div>
        <div class="bg-white rounded-2xl border border-gray-200 p-6">
          <p class="text-base font-bold text-gray-900 mb-6 leading-relaxed">${q.situation}</p>
          <div class="space-y-3">
            <button class="apt-answer-btn w-full text-left px-4 py-4 bg-blue-50 border-2 border-blue-200 rounded-xl text-sm text-gray-800 hover:bg-blue-100 hover:border-blue-400 transition" data-choice="A">
              <span class="font-bold text-blue-600 mr-2">A.</span>${q.optionA}
            </button>
            <button class="apt-answer-btn w-full text-left px-4 py-4 bg-purple-50 border-2 border-purple-200 rounded-xl text-sm text-gray-800 hover:bg-purple-100 hover:border-purple-400 transition" data-choice="B">
              <span class="font-bold text-purple-600 mr-2">B.</span>${q.optionB}
            </button>
          </div>
        </div>
      </div>`;
    el.querySelectorAll('.apt-answer-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const choice = btn.dataset.choice;
        const scores = choice === 'A' ? q.A_scores : q.B_scores;
        Object.keys(scores).forEach(k => { state.aptScores[k] += scores[k]; });
        if (state.aptCurrentQ < aptitudeQuestions.length - 1) {
          state.aptCurrentQ++;
          renderAptPhase();
        } else {
          state.aptPhase = 'loading';
          renderAptPhase();
        }
      });
    });
  } else if (state.aptPhase === 'loading') {
    const msgs = ['응답을 분석하고 있습니다...', '성향 패턴을 매칭하고 있습니다...', '결과를 생성하고 있습니다...'];
    el.innerHTML = `
      <div class="bg-white rounded-2xl border border-gray-200 p-8 text-center">
        <div class="text-4xl mb-4 animate-bounce">🔍</div>
        <p class="text-sm text-gray-600" id="loadingMsg">${msgs[0]}</p>
        <div class="w-48 mx-auto mt-4 bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full loading-bar"></div></div>
      </div>`;
    let step = 0;
    const interval = setInterval(() => {
      step++;
      if (step < msgs.length) { document.getElementById('loadingMsg').textContent = msgs[step]; }
      else { clearInterval(interval); state.aptPhase = 'result'; renderAptPhase(); }
    }, 1000);
  } else if (state.aptPhase === 'result') {
    const maxType = Object.keys(state.aptScores).reduce((a,b) => state.aptScores[a] > state.aptScores[b] ? a : b);
    const result = personaResults[maxType];
    const maxScore = Math.max(...Object.values(state.aptScores));
    const planText = `[자기/팀 이해] 나의 기획자 유형: ${result.title} (${result.name})\n${result.description}\n강점: ${result.strengths.join(', ')}`;
    el.innerHTML = `
      <div class="fade-in space-y-4">
        <button onclick='sendToPlan(1, ${planArg(planText)})' class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition">📄 기획안 [자기/팀 이해] 칸으로 보내기</button>
        <div class="bg-white rounded-2xl border border-gray-200 p-6 text-center">
          <div class="text-5xl mb-3">${result.emoji}</div>
          <h3 class="text-xl font-bold text-gray-900 mb-1">${result.title}</h3>
          <p class="text-sm text-gray-500 mb-3">${result.name}</p>
          <p class="text-sm text-gray-700 leading-relaxed">${result.description}</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <p class="text-xs font-medium text-gray-600 mb-3">당신의 강점 5가지</p>
          <ul class="space-y-2">
            ${result.strengths.map((s,i) => `<li class="flex items-center gap-2 text-sm text-gray-700"><span class="w-5 h-5 flex items-center justify-center bg-blue-100 text-blue-600 rounded-full text-xs font-bold">${i+1}</span>${s}</li>`).join('')}
          </ul>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <p class="text-xs font-medium text-gray-600 mb-3">유형별 점수</p>
          <div class="space-y-2">
            ${Object.entries(state.aptScores).map(([k,v]) => {
              const pr = personaResults[k];
              const w = (v / maxScore) * 100;
              return `<div>
                <div class="flex justify-between text-xs mb-1"><span class="text-gray-700">${pr.emoji} ${pr.title} (${k})</span><span class="font-bold ${k === maxType ? 'text-blue-600' : 'text-gray-500'}">${v}점</span></div>
                <div class="w-full bg-gray-100 rounded-full h-3"><div class="${k === maxType ? 'bg-blue-600' : 'bg-gray-300'} h-3 rounded-full transition-all" style="width:${w}%"></div></div>
              </div>`;
            }).join('')}
          </div>
        </div>
        <button onclick="state.aptPhase='intro';state.aptCurrentQ=0;state.aptScores={CEO:0,PM:0,CPO:0,CMO:0,CSL:0};renderAptPhase();" class="w-full py-3 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200 transition">다시 테스트하기</button>
      </div>`;
  }
}

function setupCopywriterTool() {

async function handleCopywriterGenerate() {
  const productName = document.getElementById('cpProductName').value.trim();
  const target = document.getElementById('cpTarget').value.trim();
  const tone = document.getElementById('cpTone').value;
  const length = document.querySelector('input[name="cpLength"]:checked').value;
  if (!productName || !target) { showToast('상품명과 타겟 고객을 입력해주세요'); return; }

  const toneMap = { emotional: '감성적', fun: '재미있고 유머러스한', serious: '진지하고 신뢰감 있는', trendy: '트렌디하고 세련된', storytelling: '스토리텔링 형식의' };
  const lengthMap = { short: '1~2줄 (짧고 임팩트 있게)', medium: '3~4줄 (적당한 길이)', long: '5줄 이상 (상세하게)' };
  const resultEl = document.getElementById('cpResult');
  resultEl.innerHTML = renderLoadingState(['프롬프트 구성 중...', '카피 생성 중...', '결과 정리 중...']);

  const prompt = `당신은 한국의 최고 광고 카피라이터입니다. TOPIK 3급 수준의 쉬운 한국어로 작성하세요.

상품/서비스: ${productName}
타겟 고객: ${target}
톤: ${toneMap[tone]}
길이: ${lengthMap[length]}

정확히 3개의 광고 카피를 JSON 배열로 반환하세요. 각 카피는 다른 접근법(질문형, 서술형, 감탄형 등)을 사용하세요.
반드시 아래 형식으로만 응답하세요:
[
  { "title": "카피 제목/접근법", "copy": "광고 카피 본문", "tip": "이 카피가 효과적인 이유 한 줄" },
  { "title": "카피 제목/접근법", "copy": "광고 카피 본문", "tip": "이 카피가 효과적인 이유 한 줄" },
  { "title": "카피 제목/접근법", "copy": "광고 카피 본문", "tip": "이 카피가 효과적인 이유 한 줄" }
]`;

  const raw = await callGeminiAPI(prompt);
  const data = raw ? safeParseJSON(raw) : null;

  if (data && Array.isArray(data) && data.length >= 3) {
    renderCopywriterResult(resultEl, data, false);
  } else {
    const mock = [
      { title: '질문형 카피', copy: `${productName}, 아직도 안 써봤어요?\n${target}이라면 꼭 필요한 아이템!`, tip: '질문으로 호기심을 유발합니다' },
      { title: '감성형 카피', copy: `당신의 하루에 작은 변화를 선물하세요.\n${productName}과 함께라면 매일이 특별해집니다.`, tip: '감성에 호소하여 공감을 이끌어냅니다' },
      { title: '혜택 강조형 카피', copy: `지금 ${productName}을 만나보세요!\n${target}을 위해 특별히 준비했습니다.\n후회 없는 선택, 지금 바로!`, tip: '구체적 혜택과 행동을 유도합니다' }
    ];
    renderCopywriterResult(resultEl, mock, true);
  }
}

let msKeywords = [''];
function renderMsKeywordInputs() {
  const list = document.getElementById('msKeywordList');
  if (!list) return;
  const BULLETS = ['1️⃣','2️⃣','3️⃣','4️⃣','5️⃣'];
  list.innerHTML = msKeywords.map((val, i) => `
    <div class="flex items-center gap-1.5">
      <span class="text-gray-400 text-xs w-5 shrink-0 text-center">${BULLETS[i]}</span>
      <input type="text" data-idx="${i}" value="${String(val).replace(/"/g,'&quot;')}" placeholder="예: 유기농 캡슐커피" class="ms-kw-input flex-1 px-2.5 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      ${msKeywords.length > 1 ? `<button type="button" data-rm="${i}" class="ms-kw-rm w-7 h-7 flex items-center justify-center text-gray-400 hover:text-red-500 rounded">✕</button>` : ''}
    </div>
  `).join('');
  list.querySelectorAll('.ms-kw-input').forEach(inp => {
    inp.addEventListener('input', e => { msKeywords[Number(e.target.dataset.idx)] = e.target.value; });
  });
  list.querySelectorAll('.ms-kw-rm').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = Number(e.currentTarget.dataset.rm);
      msKeywords.splice(idx, 1);
      if (msKeywords.length === 0) msKeywords = [''];
      renderMsKeywordInputs();
    });
  });
  // Add 버튼 상태
  const addBtn = document.getElementById('msAddKeywordBtn');
  if (addBtn) addBtn.disabled = msKeywords.length >= 5;
  if (addBtn) addBtn.style.opacity = msKeywords.length >= 5 ? '0.4' : '1';
}
function setupMarketScannerTool() {
  msKeywords = [''];
  renderMsKeywordInputs();
  document.getElementById('msAddKeywordBtn').addEventListener('click', () => {
    if (msKeywords.length >= 5) return;
    msKeywords.push('');
    renderMsKeywordInputs();
  });
  document.getElementById('msGenerateBtn').addEventListener('click', handleMarketScannerGenerate);
}

async function handleMarketScannerGenerate() {

  if (cleanKeywords.length === 0) { showToast('키워드를 1개 이상 입력해주세요'); return; }

  const ageMap = { all: '전체 연령', '10-20': '10~20대', '30-40': '30~40대', '50+': '50대 이상' };

    } else if (kw.includes('뷰티') || kw.includes('화장품') || kw.includes('스킨케어')) {
      mock = { relatedKeywords: ['비건뷰티', '클린뷰티', '민감성스킨케어', '자연유래화장품', '더마코스메틱'], competitors: [{ name: '아누아', description: '클린 뷰티 브랜드', strength: 'SNS 마케팅 강점', weakness: '제품 라인 제한적' }, { name: '달바', description: '비건 스킨케어', strength: '해외 시장 인지도', weakness: '가격 진입장벽' }, { name: '토리든', description: '수분 케어 전문', strength: '가성비 좋은 이미지', weakness: '브랜드 스토리 약함' }], painPoints: ['어떤 성분이 내 피부에 맞는지 모름', '가격 대비 효과를 느끼기 어려움', '성분 안전성에 대한 불신'], report: `${keyword} 시장은 클린뷰티, 비건 트렌드와 함께 급성장 중입니다. ${ageMap[age]} 소비자는 성분 투명성과 실제 효과를 중시합니다. 경쟁사 대비 확실한 성분 차별화와 사용 후기 마케팅이 핵심입니다.` };

const spLists = { customers: [''], strengths: [''], offers: [''] };
function renderSpListInputs(key, containerId, placeholder) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const BULLETS = ['1️⃣','2️⃣','3️⃣','4️⃣','5️⃣'];
  c.innerHTML = spLists[key].map((val, i) => `
    <div class="flex items-center gap-1.5 mb-1.5">
      <span class="text-gray-400 text-xs w-5 shrink-0 text-center">${BULLETS[i]}</span>
      <input type="text" data-idx="${i}" value="${String(val).replace(/"/g,'&quot;')}" placeholder="${placeholder}" class="sp-${key}-input flex-1 px-2.5 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      ${spLists[key].length > 1 ? `<button type="button" data-rm="${i}" class="sp-${key}-rm w-7 h-7 flex items-center justify-center text-gray-400 hover:text-red-500 rounded">✕</button>` : ''}
    </div>
  `).join('');
  c.querySelectorAll(`.sp-${key}-input`).forEach(inp => {
    inp.addEventListener('input', e => { spLists[key][Number(e.target.dataset.idx)] = e.target.value; });
  });
  c.querySelectorAll(`.sp-${key}-rm`).forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = Number(e.currentTarget.dataset.rm);
      spLists[key].splice(idx, 1);
      if (spLists[key].length === 0) spLists[key] = [''];
      renderSpListInputs(key, containerId, placeholder);
    });
  });
}

function switchSalesTab(tab) {
  const data = window._salesPlannerData;
  const detailBtn = document.getElementById('spTabDetail');
  const liveBtn = document.getElementById('spTabLive');
  const content = document.getElementById('spTabContent');
  if (tab === 'detail') {
    detailBtn.className = 'flex-1 py-2 text-xs font-bold rounded-lg bg-white text-gray-900 shadow-sm transition';
    liveBtn.className = 'flex-1 py-2 text-xs font-bold rounded-lg text-gray-500 transition';
    content.innerHTML = renderSalesDetailTab(data.detailPage);
  } else {
    detailBtn.className = 'flex-1 py-2 text-xs font-bold rounded-lg text-gray-500 transition';
    liveBtn.className = 'flex-1 py-2 text-xs font-bold rounded-lg bg-white text-gray-900 shadow-sm transition';
    content.innerHTML = renderSalesLiveTab(data.liveScript);
  }
}

        `;
      }).join('')}
    </div>
  `;
}

// ROAS 시뮬레이터 — 깍두기 mockup 확정안 (2026-04-07 포팅)
// 입력 2개(광고비·매출) + 광고채널 → 수식 계산 + 신호등 + 경량 AI 한 줄 처방

};
function calculateRoas(adSpend, revenue) {
  const roas = adSpend > 0 ? Number((revenue / adSpend).toFixed(1)) : 0;
  const profit = revenue - adSpend;
  let status;
  if (roas < 1.5) status = 'loss';
  else if (roas <= 2.5) status = 'breakeven';
  else status = 'profit';
  return { roas, profit, status };
}

function setupRoasSimulatorTool() {
  // 콤마 자동 포맷팅
  const formatInput = (el) => {
    el.addEventListener('input', () => {
      const digits = el.value.replace(/[^0-9]/g, '');
      el.value = digits ? Number(digits).toLocaleString() : '';
    });
  };
  formatInput(document.getElementById('rsAdSpend'));
  formatInput(document.getElementById('rsRevenue'));
  document.getElementById('rsGenerateBtn').addEventListener('click', handleRoasSimulatorGenerate);
}

async function handleRoasSimulatorGenerate() {
  const adSpend = Number(document.getElementById('rsAdSpend').value.replace(/,/g, ''));
  const revenue = Number(document.getElementById('rsRevenue').value.replace(/,/g, ''));
  const channel = document.getElementById('rsChannel').value;
  if (!(adSpend > 0) || !(revenue >= 0)) { showToast('광고비와 매출을 입력해주세요'); return; }

  const resultEl = document.getElementById('rsResult');
  resultEl.innerHTML = renderLoadingState(['광고 점수를 계산 중이에요…']);

  // 수식 계산 (AI 없어도 무조건 가능)
  const { roas, profit, status } = calculateRoas(adSpend, revenue);

  // 경량 AI 한 줄 처방 (실패해도 수식 결과는 표시)
  let prescription = '';
  let todoOne = '';
  let isMock = true;

  if (isAIEnabled()) {
    const statusKo = status === 'loss' ? '손해' : status === 'breakeven' ? '본전' : '좋아요';
    const direction = status === 'loss'
      ? '광고비를 줄이거나 광고 소재를 완전히 바꾸는'
      : status === 'breakeven'
        ? '같은 예산에서 광고 소재·문구를 개선하는'
        : '잘 되는 광고에 예산을 더 키우는';
    const prompt = `## 역할
한국 퍼포먼스 마케팅 10년차 전문가예요.
외국인 학생(TOPIK 3급)에게 ROAS 진단 결과를 한 줄로 알려줘요.

## 입력 데이터
- 광고비: ${adSpend.toLocaleString()}원
- 매출: ${revenue.toLocaleString()}원
- ROAS: ${roas} (${statusKo})
- 광고 채널: ${ROAS_CHANNELS[channel].replace(/^[^\\s]+\\s/, '')}

## 응답 형식 (JSON만, 다른 텍스트 X)
{
  "prescription": "큰 한 줄 처방. 형식: '동사 명령형\\n구체적 액션'. 줄바꿈 \\n 1개 사용. 예: '광고비를 줄이세요\\n30만원 → 20만원으로'",
  "todoOne": "오늘 할 일 1개. 짧고 구체적인 행동. 예: '광고 사진을 새 걸로 바꿔보세요'"
}

## 작성 규칙
- prescription 방향: ${direction} 쪽으로
- prescription 두 번째 줄에 ${adSpend.toLocaleString()}원 같은 실제 숫자를 활용한 구체적 변경
- todoOne은 광고 사진/문구/타겟/시간대 중 1개에 대한 즉시 실행 가능한 행동
- 모든 텍스트 TOPIK 3급 쉬운 한국어 ~해요 체
- 어려운 용어 금지 (CTR, CPC, 리타겟팅 X)`;
    try {
      const raw = await callGemini(prompt);
      const parsed = raw ? safeParseJSON(raw) : null;
      if (parsed?.prescription && parsed?.todoOne) {
        prescription = String(parsed.prescription);
        todoOne = String(parsed.todoOne);
        isMock = false;
      }
    } catch (err) { console.error('[ROAS] AI failed:', err); }
  }

  // Mock 폴백 (AI 실패 또는 미연결)
  if (!prescription) {
    const spendMan = Math.round(adSpend / 10000);
    const lossPool = [
      { p: `광고비를 줄이세요\n${spendMan}만원 → ${Math.max(1, Math.round(spendMan * 0.7))}만원으로`, t: '광고 사진을 새 걸로 바꿔보세요' },
      { p: `타겟을 더 좁혀보세요\n관심사 1~2개로 집중`, t: '광고 문구의 첫 줄을 다시 써보세요' },
    ];
    const breakevenPool = [
      { p: `광고 사진을 바꿔보세요\n눈에 띄는 색으로`, t: '광고 사진을 새 걸로 바꿔보세요' },
      { p: `광고 문구를 더 짧게\n핵심만 한 줄로`, t: '광고 문구의 첫 줄을 다시 써보세요' },
    ];
    const profitPool = [
      { p: `광고비를 늘려보세요\n${spendMan}만원 → ${Math.round(spendMan * 1.5)}만원으로`, t: '잘 되는 광고에 예산을 더 넣어보세요' },
      { p: `같은 광고를 더 오래 돌려보세요\n7일 더 연장`, t: '광고 시간대를 저녁으로 바꿔보세요' },
    ];
    const pool = status === 'loss' ? lossPool : status === 'breakeven' ? breakevenPool : profitPool;
    const pick = pool[Math.floor(Math.random() * pool.length)];
    prescription = pick.p;
    todoOne = pick.t;
  }

  renderRoasSimulatorResult(resultEl, { adSpend, revenue, roas, profit, status, prescription, todoOne }, isMock);
}
