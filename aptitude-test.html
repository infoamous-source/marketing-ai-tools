    // ─── 상태 ────────────────────────────────────────────────────
    const state = {
      phase: 'intro', // intro / test / loading / result

      loadingStep: 0,
      previousResult: null,
    };

    const STORAGE_KEY = 'aptitudeTest:lastResult';

    // ─── 유틸 ────────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      })[m]);
    }

    function loadPrevious() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch { return null; }
    }

    function savePrevious(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    }

    function pickSet(previousSetId) {
      // 첫 풀이면 한국 성인용 심화 세트(set4)를 기본으로
      if (!previousSetId) {
        return QUESTION_SETS.find((s) => s.id === 'set4') || QUESTION_SETS[0];
      }
      // 이전에 푼 세트는 피해서 랜덤 (세트4 포함 전체 4세트 풀에서)
      const available = QUESTION_SETS.filter((s) => s.id !== previousSetId);
      return available[Math.floor(Math.random() * available.length)];
    }

    function calculateResult(answers, questions) {
      const scores = { CEO: 0, PM: 0, CPO: 0, CMO: 0, CSL: 0 };
      for (const [qid, choice] of Object.entries(answers)) {
        const q = questions.find((x) => x.id === qid);
        if (!q) continue;
        const weights = choice === 'A' ? q.wA : q.wB;
        for (const p of weights) scores[p] += 1;
      }
      let resultType = 'CEO', maxScore = -1;
      for (const p of PERSONA_ORDER) {
        if (scores[p] > maxScore) { maxScore = scores[p]; resultType = p; }
      }
      return { resultType, scores };
    }

    // ─── 화면 렌더링 ─────────────────────────────────────────────

      if (state.phase === 'intro') renderIntro();
      else if (state.phase === 'test') renderTest();
      else if (state.phase === 'loading') renderLoading();
      else if (state.phase === 'result') renderResult();

          </div>

          <div class="bg-white rounded-2xl border border-gray-200 p-6 print-card">
            <h3 class="font-bold text-kk-brown text-sm mb-4">유형별 점수</h3>
            <div class="space-y-3">${chartRows}</div>
          </div>

          <div class="space-y-3 no-print">
            <button id="pdf-btn" class="w-full py-4 bg-gray-900 hover:bg-black text-white font-bold rounded-2xl transition-colors text-base flex items-center justify-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              결과를 PDF로 저장하기
            </button>
            <div class="flex gap-3">
              <button id="restart-btn" class="flex-1 py-3 bg-white border border-gray-200 text-gray-600 font-medium rounded-2xl hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                다시 테스트
              </button>
              <button id="share-btn" class="flex-1 py-3 bg-white border border-gray-200 text-gray-600 font-medium rounded-2xl hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                공유
              </button>
            </div>
            <p class="text-center text-[11px] text-gray-400">PDF 저장 버튼을 누르면 인쇄 창이 열립니다. 대상을 <b>"PDF로 저장"</b>으로 선택하세요.</p>
          </div>
        </div>
      `;

      document.getElementById('pdf-btn').onclick = () => window.print();
      document.getElementById('restart-btn').onclick = restart;
      document.getElementById('share-btn').onclick = share;

      // 컨페티
      if (window.confetti) {
        window.confetti({
          particleCount: 120, spread: 80, origin: { y: 0.6 },
          colors: ['#f43f5e', '#ec4899', '#f59e0b', '#8b5cf6', '#3b82f6', '#10b981'],
        });
      }
    }

    // ─── 이벤트 핸들러 ──────────────────────────────────────────
    function startTest() {
      const prevSetId = state.previousResult?.questionSetId;
      state.activeSet = pickSet(prevSetId);
      state.answers = {};
      state.currentQuestion = 0;
      state.result = null;
      state.phase = 'test';
      render();
    }

    function selectOption(choice) {
      if (state.isTransitioning) return;
      const qs = state.activeSet.questions;
      const q = qs[state.currentQuestion];
      state.answers[q.id] = choice;
      state.isTransitioning = true;
      render();

      setTimeout(() => {
        if (state.currentQuestion + 1 < qs.length) {
          state.currentQuestion += 1;
        } else {
          state.phase = 'loading';
          state.loadingStep = 0;
          render();
          runLoading();
          return;
        }
        state.isTransitioning = false;
        render();
      }, 400);
    }

    function runLoading() {
      const timers = [];
      timers.push(setTimeout(() => { state.loadingStep = 1; render(); }, 1000));
      timers.push(setTimeout(() => { state.loadingStep = 2; render(); }, 2000));
      timers.push(setTimeout(() => {
        const computed = calculateResult(state.answers, state.activeSet.questions);
        state.result = computed;
        const saved = {
          completedAt: new Date().toISOString(),
          answers: state.answers,
          resultType: computed.resultType,
          scores: computed.scores,
          questionSetId: state.activeSet.id,
        };
        savePrevious(saved);
        state.previousResult = saved;
        state.phase = 'result';
        render();
      }, 3000));
    }

    function restart() {
      state.phase = 'intro';
      state.currentQuestion = 0;
      state.answers = {};
      state.result = null;
      state.loadingStep = 0;
      render();
    }

    async function share() {
      const r = state.result;
      if (!r) return;
      const p = PERSONAS[r.resultType];
      const shareText = `${p.emoji} ${p.name} — ${p.title}\n#마케팅직무적성테스트`;
      if (navigator.share) {
        try { await navigator.share({ title: '나의 마케팅 적성 결과', text: shareText }); return; } catch {}
      }
      try {
        await navigator.clipboard.writeText(shareText);
        alert('결과가 복사되었습니다!');
      } catch {
        alert(shareText);
      }
    }

    backBtn.onclick = () => {
      if (state.phase === 'result') restart();
    };

    // ─── 초기화 ─────────────────────────────────────────────────
    state.previousResult = loadPrevious();
    render();
  </script>
</body>
</html>
